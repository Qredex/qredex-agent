version: 1
project:
  name: '@qredex/agent'
  description: Lightweight browser agent for Qredex intent capture and locking
  type: library
metadata:
  team: frontend
  owner: qredex
  repo_class: browser-sdk
execution:
  preferred: native
  supported:
    - native
tools:
  node: '>=18'
  npm: '*'
tasks:
  setup:
    description: Install agent dependencies
    notes: |
      Use this first after cloning or when dependencies change.
    category: setup
    run: npm ci
    safe_for_agent: true
  build:
    description: Build the core package and wrappers
    notes: |
      Use this to verify the package and wrapper bundles still build cleanly.
    category: build
    run: npm run build
    depends_on:
      - setup
    safe_for_agent: true
  build:agent:
    description: Build the core browser agent artifacts
    notes: |
      Use this when you need the browser agent bundles specifically.
    category: build
    run: npm run build:agent
    depends_on:
      - setup
    safe_for_agent: true
  build:cdn:dev:
    description: Build the development CDN bundle
    notes: |
      Use this to produce the development CDN artifact.
    category: build
    run: npm run build:cdn:dev
    depends_on:
      - setup
    safe_for_agent: true
  build:dev:
    description: Build the development bundles
    notes: |
      Use this for local development bundle verification.
    category: build
    run: npm run build:dev
    depends_on:
      - setup
    safe_for_agent: true
  build:stage:
    description: Build the staging bundles
    notes: |
      Use this when preparing the staging bundle set.
    category: build
    run: npm run build:stage
    depends_on:
      - setup
    safe_for_agent: true
  build:wrappers:
    description: Build framework wrappers
    notes: |
      Use this when the framework wrapper packages need to be rebuilt.
    category: build
    run: npm run build:wrappers
    depends_on:
      - setup
    safe_for_agent: true
  dev:
    description: Start the agent development server
    notes: |
      Use this for local development and manual debugging.
    category: dev
    run: npm run dev
  example:
    description: Run the example harness
    notes: |
      Use this to exercise the example integration harness.
    category: dev
    run: npm run example
  example:serve:
    description: Serve the example harness
    notes: |
      Use this when you need to serve the example app directly.
    category: dev
    run: npm run example:serve
  format:
    description: Format the agent sources
    notes: |
      Use this before committing to keep source formatting consistent.
    category: test
    run: npm run format
    depends_on:
      - setup
    safe_for_agent: true
  format:check:
    description: Check agent formatting
    notes: |
      Use this as a quick formatting gate without rewriting files.
    category: test
    run: npm run format:check
    depends_on:
      - setup
    safe_for_agent: true
  lint:
    description: Lint the agent sources
    notes: |
      Use this to catch source issues before tests or releases.
    category: test
    run: npm run lint
    depends_on:
      - setup
    safe_for_agent: true
  preview:
    description: Preview the built agent bundle
    notes: |
      Use this to inspect the built package before release or publication.
    category: dev
    run: npm run preview
  publish:npm:
    description: Publish the npm package
    notes: |
      Use this only when you are ready to release the package publicly.
      Example: ota run publish:npm
      Typical flow:
        ota run release:check
        ota run publish:npm
    category: release
    run: npm run publish:npm
  publish:npm:dry-run:
    description: Dry-run the npm publish flow
    notes: |
      Use this to validate the publish flow without publishing.
      Example: ota run publish:npm:dry-run
      Typical flow:
        ota run release:check
        ota run publish:npm:dry-run
    category: release
    run: npm run publish:npm:dry-run
  release:cdn:
    description: Prepare the production CDN release
    notes: |
      Use this when preparing the production CDN artifact.
      Example: ota run release:cdn
      Typical flow:
        ota run release:check
        ota run release:cdn
        ota run release:cdn:verify
    category: release
    run: npm run release:cdn
  release:cdn:backfill:
    description: Backfill CDN history
    notes: |
      Use this for CDN history repair or backfill work.
      Example: ota run release:cdn:backfill --versions 1.0.0,1.0.1
      Example env + task command: QREDEX_CDN_BUCKET=... ota run release:cdn:backfill --versions 1.0.0,1.0.1
      This task requires `QREDEX_CDN_BUCKET` to be set.
      The `versions` input is a comma-separated list of release versions.
      Example script command: node scripts/backfill-cdn-history.mjs 1.0.0 1.0.1
    category: release
    run: npm run release:cdn:backfill
    inputs:
      versions:
        description: Comma-separated release versions to backfill in CDN history
        required: true
  release:cdn:dev:
    description: Prepare a development CDN release
    notes: |
      Use this to prepare the development CDN artifact.
      Example: ota run release:cdn:dev
      Typical flow:
        ota run release:cdn:dev
        ota run release:cdn:dev:upload
    category: release
    run: npm run release:cdn:dev
  release:cdn:dev:upload:
    description: Upload the development CDN release
    notes: |
      Use this to publish the development CDN artifact.
      Example: ota run release:cdn:dev:upload
      Example env + task command: QREDEX_CDN_BUCKET=... ota run release:cdn:dev:upload
      This task requires `QREDEX_CDN_BUCKET` to be set.
      Typical flow:
        ota run release:cdn:dev
        ota run release:cdn:dev:upload
    category: release
    run: npm run release:cdn:dev:upload
  release:cdn:staging:
    description: Prepare a staging CDN release
    notes: |
      Use this to prepare the staging CDN artifact.
      Example: ota run release:cdn:staging
      Typical flow:
        ota run release:cdn:staging
        ota run release:cdn:staging:upload
    category: release
    run: npm run release:cdn:staging
  release:cdn:staging:upload:
    description: Upload the staging CDN release
    notes: |
      Use this to publish the staging CDN artifact.
      Example: ota run release:cdn:staging:upload
      Example env + task command: QREDEX_CDN_BUCKET=... ota run release:cdn:staging:upload
      This task requires `QREDEX_CDN_BUCKET` to be set.
      Typical flow:
        ota run release:cdn:staging
        ota run release:cdn:staging:upload
    category: release
    run: npm run release:cdn:staging:upload
  release:cdn:upload:
    description: Upload the production CDN release
    notes: |
      Use this only when the production CDN artifact is ready.
      Example: ota run release:cdn:upload
      Example env + task command: QREDEX_CDN_BUCKET=... ota run release:cdn:upload
      This task requires `QREDEX_CDN_BUCKET` to be set.
      Typical flow:
        ota run release:cdn
        ota run release:cdn:upload
    category: release
    run: npm run release:cdn:upload
  release:cdn:verify:
    description: Verify CDN history and published artifacts
    notes: |
      Use this to confirm the CDN release history is consistent.
      Example: ota run release:cdn:verify
      Example env + task command: QREDEX_CDN_BUCKET=... ota run release:cdn:verify
      This task requires `QREDEX_CDN_BUCKET` to be set.
      Typical flow:
        ota run release:cdn:verify
    category: release
    run: npm run release:cdn:verify
    safe_for_agent: true
  release:check:
    description: Run the release verification suite
    notes: |
      Use this as the release gate before publishing the package.
      Example: ota run release:check
      Typical flow:
        ota run release:check
    category: release
    run: npm run release:check
    depends_on:
      - setup
    safe_for_agent: true
  release:version:
    description: Bump the release version
    notes: |
      Use this when preparing a new release version.
      Example: ota run release:version --version 1.2.3
      The task forwards `--version` into `OTA_INPUT_VERSION` for scripts/set-release-version.mjs.
      Typical flow:
        ota run release:version --version 1.2.3
        ota run release:check
      Example script command: npm run release:version -- 1.2.3
      Example script file: node scripts/set-release-version.mjs 1.2.3
    category: release
    run: npm run release:version
    inputs:
      version:
        description: New release version to apply to the package set
        required: true
  test:
    description: Run the unit test suite
    notes: |
      Use this for the standard unit test pass.
    category: test
    run: npm run test
    depends_on:
      - setup
    safe_for_agent: true
  test:browser:
    description: Run browser-backed tests
    notes: |
      Use this when browser-backed validation is needed.
    category: test
    run: npm run test:browser
    depends_on:
      - setup
    safe_for_agent: true
  test:ui:
    description: Run the Vitest UI
    notes: |
      Use this when you want the interactive Vitest UI.
    category: test
    run: npm run test:ui
    depends_on:
      - setup
    safe_for_agent: true
  test:watch:
    description: Run watch mode tests
    notes: |
      Use this for long-running local test feedback loops.
    category: test
    run: npm run test:watch
  unlink:
    description: Remove the local Bun link
    notes: |
      Use this to detach the local package link after development work.
    category: dev
    run: npm run unlink
  ci:
    description: Run the standard agent verification suite
    notes: |
      Use this as the canonical local verification path before merging changes.
    category: test
    run: npm run release:check
    depends_on:
      - setup
    safe_for_agent: true
agent:
  entrypoint: setup
  default_task: ci
  safe_tasks:
    - setup
    - build
    - build:agent
    - build:cdn:dev
    - build:dev
    - build:stage
    - build:wrappers
    - format
    - format:check
    - lint
    - release:check
    - test
    - test:browser
    - test:ui
    - ci
  verify_after_changes:
    - format:check
    - lint
    - test
    - release:check
    - ci
  writable_paths:
    - docs
    - examples
    - packages
    - scripts
    - src
    - tests
    - README.md
  protected_paths:
    - dist
    - node_modules
    - package-lock.json
    - bun.lock
  notes: |
    Use the Ota workflow first for setup, validation, and task execution.
    Treat Ota as the default workflow, the way npm is the default in Node repos.
    Use `ota validate` to verify the contract.
    Use `ota doctor` to inspect readiness and agent guidance.
    Use `ota tasks` to discover runnable repo actions.
    Use `ota run setup` to prepare the repo.
    Use `ota run ci` to run the canonical verification path.
    Use npm for the primary workflow in this repo.
    Keep wrapper packages and the core browser agent aligned.
    Prefer release:check for confidence before publishing.
