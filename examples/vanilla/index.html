<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qredex Agent - Vanilla JS Example</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>🛍️ Qredex Agent Demo</h1>
    <p>Vanilla JavaScript integration example</p>

    <div class="status">
      <div class="status-item">
        <div class="status-dot" id="iit-status"></div>
        <span>IIT: <strong id="iit-value">Checking...</strong></span>
      </div>
      <div class="status-item">
        <div class="status-dot" id="pit-status"></div>
        <span>PIT: <strong id="pit-value">Checking...</strong></span>
      </div>
    </div>
  </header>

  <main>
    <section class="products" id="products">
      <!-- Products will be loaded here -->
    </section>

    <section class="cart">
      <h2>🛒 Shopping Cart</h2>
      <ul class="cart-items" id="cart-items">
        <li>Cart is empty</li>
      </ul>
      <div style="text-align: right; margin-top: 15px;">
        <strong>Total: $<span id="cart-total">0.00</span></strong>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="btn" onclick="clearCart()" style="background: #f44336;">
          Clear Cart
        </button>
        <button class="btn" onclick="checkout()" id="checkout-btn" disabled>
          Checkout
        </button>
      </div>
    </section>
  </main>

  <!-- Configure Qredex Agent BEFORE loading -->
  <script>
    window.QredexAgentConfig = {
      debug: true,  // Enable debug logging
    };
  </script>

  <!-- Qredex Agent -->
  <script src="https://cdn.qredex.com/agent/v1/qredex-agent.iife.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
