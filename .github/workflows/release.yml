name: Publish CDN
run-name: >-
  Publish CDN from ${{ github.event.inputs.release_ref || github.event.workflow_run.head_sha || github.ref_name }}

on:
  workflow_run:
    workflows:
      - Create release tag from version bump
    types:
      - completed
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing release tag or commit to publish with the latest workflow
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.release_ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      QREDEX_CDN_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.release_ref || github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        run: |
          git fetch --force --tags origin
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAG="v${VERSION}"
          TAG_COMMIT=$(git rev-list -n 1 "${TAG}")
          CURRENT_COMMIT=$(git rev-parse HEAD)

          test -n "${TAG_COMMIT}"
          test "${TAG_COMMIT}" = "${CURRENT_COMMIT}"

      - name: Lint
        run: npm run lint

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test
        run: npm run test:browser

      - name: Release checks
        run: npm run release:check

      - name: Prepare CDN release assets
        run: node scripts/prepare-cdn-release.mjs

      - name: Upload CDN release assets
        run: npm run release:cdn:upload
