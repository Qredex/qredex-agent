name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      QREDEX_CDN_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

      - name: Lint
        run: npm run lint

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test
        run: npm run test:browser

      - name: Release checks
        run: npm run release:check

      - name: Prepare CDN release assets
        run: node scripts/prepare-cdn-release.mjs

      - name: Upload CDN release assets
        run: npm run release:cdn:upload
