name: Publish CDN
run-name: >-
  Publish CDN from ${{ github.event.inputs.release_ref || github.event.workflow_run.head_sha || github.ref_name }}

on:
  workflow_run:
    workflows:
      - Create release tag from version bump
    types:
      - completed
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing release tag or commit to publish with the latest workflow
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.release_ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      QREDEX_CDN_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.release_ref || github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release
        run: |
          git fetch --force --tags origin
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAG="v${VERSION}"
          TAG_COMMIT=$(git rev-list -n 1 "${TAG}" 2>/dev/null || true)
          CURRENT_COMMIT=$(git rev-parse HEAD)

          if [ -n "${TAG_COMMIT}" ] && [ "${TAG_COMMIT}" = "${CURRENT_COMMIT}" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release tag for commit ${CURRENT_COMMIT}; skipping production CDN publish."
          fi

      - name: Skip non-release commit
        if: steps.release.outputs.should_release != 'true'
        run: echo "Skipping production CDN publish because this main commit did not create a production release tag."

      - name: Lint
        if: steps.release.outputs.should_release == 'true'
        run: npm run lint

      - name: Install Playwright browser
        if: steps.release.outputs.should_release == 'true'
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test
        if: steps.release.outputs.should_release == 'true'
        run: npm run test:browser

      - name: Release checks
        if: steps.release.outputs.should_release == 'true'
        run: npm run release:check

      - name: Prepare CDN release assets
        if: steps.release.outputs.should_release == 'true'
        run: node scripts/prepare-cdn-release.mjs

      - name: Upload CDN release assets
        if: steps.release.outputs.should_release == 'true'
        run: npm run release:cdn:upload

      - name: Verify CDN history
        if: steps.release.outputs.should_release == 'true'
        run: npm run release:cdn:verify
