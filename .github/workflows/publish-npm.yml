name: Publish packages to npm
run-name: >-
  Publish npm from ${{ github.event.inputs.release_ref || github.event.workflow_run.head_sha || github.ref_name }}

on:
  workflow_run:
    workflows:
      - Create release tag from version bump
    types:
      - completed
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing release tag or commit to publish with the latest workflow
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.inputs.release_ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref || github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup npm CLI
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release
        run: |
          git fetch --force --tags origin
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAG="v${VERSION}"
          TAG_COMMIT=$(git rev-list -n 1 "${TAG}")
          CURRENT_COMMIT=$(git rev-parse HEAD)

          test -n "${TAG_COMMIT}"
          test "${TAG_COMMIT}" = "${CURRENT_COMMIT}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish packages to npm
        run: npm run publish:npm
        env:
          QREDEX_NPM_PROVENANCE: 'true'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
