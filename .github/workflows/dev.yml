name: Publish dev CDN assets
run-name: >-
  Publish dev CDN from ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-cdn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: development
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      QREDEX_CDN_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install ota
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate ota contract
        run: ota validate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: ota run lint

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test
        run: ota run test:browser

      - name: Unit tests
        run: ota run test

      - name: Prepare dev CDN release assets
        run: ota run release:cdn:dev

      - name: Upload dev CDN release assets
        run: ota run release:cdn:dev:upload
