name: Bug report
description: Report a defect in @qredex/agent or one of the framework wrappers
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@qredex/agent"
        - "@qredex/react"
        - "@qredex/vue"
        - "@qredex/svelte"
        - "@qredex/angular"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, framework, package version, and integration path
